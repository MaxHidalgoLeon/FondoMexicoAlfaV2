# ------------------------------------------------------------------
# Fixed Income — internal canonical identifiers
#
# Government bonds (CETES/Mbonos):
#   - Yahoo:     real yields via Banxico SIE (SF43936/SF43939/SF43773/SF43774/SF43775)
#   - Bloomberg: real data via _BBG_BOND_TICKERS (CETES 28D Govt, MBONO 5Y Govt, etc.)
#   - LSEG:      real data via _RD_BOND_RICS (MX0001Y=, MX5YT=RR, etc.)
#
# Corporate bonds (CORP1/CORP2):
#   - Yahoo:     mock until real ISINs are configured
#   - Bloomberg: placeholder tickers — update _BBG_BOND_TICKERS with real ISINs
#   - LSEG:      not yet in _RD_BOND_RICS — add real RICs when available
#
# Bond symbols are null here because bonds go through get_bonds() / dedicated
# provider dicts, NOT through the equity _resolve_symbols() path.
# ------------------------------------------------------------------

CETES28:
  yahoo:     null
  lseg:      null
  bloomberg: null

