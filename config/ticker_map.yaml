# ------------------------------------------------------------------
# Fixed Income — internal canonical identifiers
#
# Government bonds (CETES/Mbonos):
#   - Yahoo:     real yields via Banxico SIE (SF43936/SF43939/SF43773)
#   - Bloomberg: real data via _BBG_BOND_TICKERS (CETES 28D Govt, etc.)
#   - LSEG:      real data via _RD_BOND_RICS (MX0001Y=, etc.)
#
# Bond symbols are null here because bonds go through get_bonds() / dedicated
# provider dicts, NOT through the equity _resolve_symbols() path.
#


CETES28:
  yahoo:     null
  lseg:      null
  bloomberg: null

CETES91:
  yahoo:     null
  lseg:      null
  bloomberg: null

MBONO3Y:
