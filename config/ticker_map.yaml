# ------------------------------------------------------------------
# Fixed Income — internal canonical identifiers
#
# Government bonds (CETES/Mbonos):
#   - Yahoo:     real yields via Banxico SIE (SF43936/SF43939/SF43773)
#   - Bloomberg: real data via _BBG_BOND_TICKERS (CETES 28D Govt, etc.)
#   - LSEG:      real data via _RD_BOND_RICS (MX0001Y=, etc.)
#
# Bond symbols are null here because bonds go through get_bonds() / dedicated
# provider dicts, NOT through the equity _resolve_symbols() path.
#


CETES28:
  yahoo:     null
  lseg:      null
  bloomberg: null

CETES91:
  yahoo:     null
  lseg:      null
  bloomberg: null

MBONO3Y:
  yahoo:     null
  lseg:      null
  bloomberg: null

# ------------------------------------------------------------------
# ETFs — versión por asset class (profe)
# ------------------------------------------------------------------

EWW:
  yahoo:           "EWW"
  yahoo_qualified: true   # US-listed ETF — no .MX suffix
  lseg:            "EWW.P"
  lseg_qualified:  true   # NYSE Arca RIC — no .MX suffix
  bloomberg:       "EWW US Equity"

INDS:
  yahoo:           "INDS"
  yahoo_qualified: true
  lseg:            "INDSINAV=SOLA"  # NAV RIC set by user — already has "=" so no suffix needed
  bloomberg:       "INDS US Equity"

IGF:
  yahoo:           "IGF"
  yahoo_qualified: true
  lseg:            "IGF.O"          # Nasdaq RIC — "." prevents .MX suffix
  bloomberg:       "IGF US Equity"

ILF:
  yahoo:           "ILF"
  yahoo_qualified: true
  lseg:            "ILF.P"
  lseg_qualified:  true   # NYSE Arca RIC — no .MX suffix
  bloomberg:       "ILF US Equity"

EMLC:
  yahoo:           "EMLC"
  yahoo_qualified: true
  lseg:            "EMLC.P"         # NYSE Arca RIC — "." prevents .MX suffix
  bloomberg:       "EMLC US Equity"
