# ---------------------------------------------------------------------------
# Ticker mapping: canonical name -> provider-specific symbols
#
# canonical: internal name used throughout the codebase
# yahoo:     ticker as used by yfinance (appended with .MX by provider)
# lseg:      Refinitiv RIC (appended with .MX by provider unless overridden)
# bloomberg: Bloomberg ticker (appended with " MM Equity" by provider)
#
# Fallback rule (applied automatically by each provider):
#   If a provider key is missing, the provider uses canonical + its default suffix.
# ---------------------------------------------------------------------------

