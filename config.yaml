# =============================================================================
# Fondo Mexico — Configuración del pipeline
# Edita estos valores para cambiar el comportamiento del proyecto.
# Los argumentos de la terminal siempre sobreescriben este archivo.
# =============================================================================

# Fuente de datos: "mock" | "yahoo" | "bloomberg" | "refinitiv"
# Puede ser string (1 fuente) o lista YAML (múltiples fuentes).
source:
  - yahoo
  - refinitiv

# Periodo de análisis
start_date: "2017-01-01"
end_date:   "2026-03-31"

# Activar overlay de cobertura (hedge Layer 2)
hedge: true

# Optimizador de portafolio:
#   "mv"     — media-varianza (SLSQP) con penalización de impacto de mercado
#   "cvar"   — minimizar CVaR al 95 % con penalización de impacto de mercado
#   "robust" — Michaud resampling (promediar N=100 soluciones MV con μ perturbado)
#   "both"   — MV + CVaR en paralelo (para comparar curvas de equity)
optimizer: "both"

# Benchmarks para la gráfica comparativa.
# Se usan nombres canónicos internos para que cada provider resuelva su símbolo.
benchmark_tickers:
  - "IPC"
  - "GBMCRE"
  - "GBMNEAR"
  - "GBMMOD"
  - "GBMALFA"

# Ruta de salida del reporte HTML
report_output: "reports/output/strategy_report.html"

# Detener el pipeline si algún test falla
abort_on_test_failure: true

# ==========================================================================
# CNBV regulatory compliance — position and concentration limits
# ==========================================================================

# Max individual position per ticker (CNBV 10% rule on NAV)
max_position_mv: 0.10
max_position_cvar: 0.10
max_position_robust: 0.10

# Consolidated issuer concentration limit (sum of all tickers with same issuer_id)
issuer_concentration_limit: 0.10

# ==========================================================================
# Liquidity sleeve — fixed-income allocation by macro regime (non-optimizable)
# ==========================================================================

# CETES28 + CETES91 allocation bounds by regime
liquidity_sleeve_min_expansion: 0.03
liquidity_sleeve_max_expansion: 0.05
liquidity_sleeve_min_tightening: 0.05
liquidity_sleeve_max_tightening: 0.08
liquidity_sleeve_min_stress: 0.08
liquidity_sleeve_max_stress: 0.15

# MBONO3Y optional buffer (0–3%, non-optimizable)
mbono3y_buffer_enabled: false
mbono3y_buffer_max: 0.03

# ==========================================================================
# Data integrity — fundamentals and mock fallback policy
# ==========================================================================

# Lag (calendar days) to apply to all fundamentals to prevent look-ahead bias
fundamentals_lag_days: 90

# If true, NO silent mock injection when real data fails — abort or return empty
strict_data_mode: true

# If true, _fill_numeric_defaults replaces NaN with static medians; if false, NaN stays
allow_fundamentals_defaults: false

# ==========================================================================
# Hedge overlay — Layer 2 leverage and FX
# ==========================================================================

# "analytical" → Layer 2 is informational only, does not affect regulated NAV
# "regulated"  → Layer 2 capped at gross_target=1.15, net_target=1.05 (LFI Art. compatible)
hedge_mode: "analytical"

# Caps for regulated mode
hedge_regulated_gross_target: 1.15
hedge_regulated_net_target: 1.05

# FX overlay Layer 1: maximum notional as fraction of NAV
fx_overlay_notional_cap: 0.15

# ==========================================================================
# EWMA block
# ==========================================================================

covariance_method: "ewma_ledoit_wolf"    # "rolling_ledoit_wolf" | "ewma_ledoit_wolf"
ewma_lambda_cov: 0.94
ewma_window_cov: 252
ewma_min_periods_cov: 60
realized_vol_method: "ewma"              # reportes HTML
realized_vol_span: 21

regime_method: "ewma_composite"          # "threshold_discrete" | "ewma_composite"
regime_ewma_span: 6
regime_threshold_expansion: 0.5
regime_threshold_stress: -0.5
regime_min_confidence_for_switch: 0.3

adtv_method: "ewma"                      # "uniform" | "ewma"
adtv_ewma_lambda: 0.97
adtv_min_periods: 60
adtv_window: 252

# ==========================================================================
# Bootstrap block
# ==========================================================================

bootstrap_enabled: true
bootstrap_n_reps: 5000
bootstrap_block_size: 20                 # "auto" | int
bootstrap_confidence: 0.95
bootstrap_seed: 42

fan_chart_enabled: true
fan_chart_n_paths: 1000
fan_chart_block_size: 20

ic_diagnostics_enabled: true
ic_bootstrap_block_size: 6

stress_distributional_enabled: true
stress_window_days: 21

enable_method_comparison: true

# ==========================================================================
# Hyperparameter optimization (Optuna TPE) — scripts/run_hyperopt.py
# ==========================================================================
# Only consumed by the dedicated script. Flipping this flag in config.yaml
# does NOT trigger a hyperopt run from run_all.py — it is a separate and
# explicit process so that search-generated params never leak into
# production by accident.
hyperopt_enabled: true
hyperopt_n_trials: 50
hyperopt_n_folds: 3
hyperopt_purge_gap_days: 21
hyperopt_objective: "sharpe_adj"          # "sharpe_adj" | "sortino" | "calmar"
hyperopt_turnover_penalty: 0.5
hyperopt_optimizer: "mv"                  # "mv" | "cvar" | "robust"
hyperopt_seed: 42
hyperopt_output: "reports/output/hyperopt_results.json"
hyperopt_config_out: "config_optimized.yaml"
hyperopt_report_out: "reports/output/hyperopt_report.html"
# Subset of parameter keys to optimize (null = full DEFAULT_SEARCH_SPACE).
# Example: hyperopt_search_keys: [bl_risk_aversion, mv_risk_aversion, ewma_lambda_cov]
hyperopt_search_keys: null
